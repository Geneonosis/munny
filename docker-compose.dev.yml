services:
  munny-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "43557:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: /app/data/munny-dev.db
    volumes:
      - munny-dev-db:/app/data
    command: sh -c "npm run migrate:dev && npm start"

volumes:
  munny-dev-db:

